name: food
description: "A student meal subscription and lock-in app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_app_check: ^0.3.1
  firebase_ui_auth: ^1.14.0
  firebase_ui_oauth_google: ^1.3.2
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  path: ^1.9.0
  path_provider: ^2.1.4
  http_parser: ^4.1.0
  url_launcher: ^6.2.6
  animate_do: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
