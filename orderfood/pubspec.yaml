name: orderfood
description: "SDUI food ordering app for campus vendors and students."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  go_router: ^14.6.2
  json_annotation: ^4.9.0
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/
