services:
  db:
    image: postgres:16
    container_name: orderfood-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: orderfood
    ports:
      - "5433:5432"
    volumes:
      - orderfood_pg_data:/var/lib/postgresql/data

volumes:
  orderfood_pg_data:
